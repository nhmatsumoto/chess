services:
  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=chessuser
      - POSTGRES_PASSWORD=chesspassword
      - POSTGRES_DB=chessdb
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chessuser -d chessdb"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=http://localhost:5000/api
    ports:
      - "5173:5173"
    depends_on:
      - backend
    environment:
      - VITE_API_URL=http://localhost:5000/api

volumes:
  postgres_data:
